name: "duto-ai"
description: "Run AI workflows in your CI pipeline with deterministic DAG execution and per-step tool control"
author: "Pedro Klein"

branding:
  icon: "cpu"
  color: "blue"

inputs:
  workflow:
    description: "Path to the workflow YAML file"
    required: true
  config:
    description: "Path to config.yaml (default: .github/ai-workflows/config.yaml)"
    required: false
    default: ".github/ai-workflows/config.yaml"
  log-level:
    description: "Log level: debug, info, or error"
    required: false
    default: "info"
  output-format:
    description: "Output format: text, json, or markdown"
    required: false
    default: ""
  output-file:
    description: "Write formatted output to this file path"
    required: false
    default: ""
  verbose:
    description: "Enable debug-level output for troubleshooting"
    required: false
    default: "false"
  version:
    description: "duto-ai version to use (default: latest)"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/PedroKlein/duto-ai/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        else
          VERSION="${{ inputs.version }}"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Setup duto-ai
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        URL="https://github.com/PedroKlein/duto-ai/releases/download/${VERSION}/duto-ai_${OS}_${ARCH}.tar.gz"
        echo "Downloading duto-ai ${VERSION} for ${OS}/${ARCH}..."

        curl -sL "$URL" | tar xz -C /usr/local/bin duto-ai
        chmod +x /usr/local/bin/duto-ai

    - name: Run workflow
      shell: bash
      run: |
        ARGS=("run")
        ARGS+=("--config" "${{ inputs.config }}")
        ARGS+=("--log-level" "${{ inputs.log-level }}")

        if [ "${{ inputs.verbose }}" = "true" ]; then
          ARGS+=("--verbose")
        fi

        if [ -n "${{ inputs.output-format }}" ]; then
          ARGS+=("--output-format" "${{ inputs.output-format }}")
        fi

        if [ -n "${{ inputs.output-file }}" ]; then
          ARGS+=("--output-file" "${{ inputs.output-file }}")
        fi

        ARGS+=("${{ inputs.workflow }}")

        duto-ai "${ARGS[@]}"
